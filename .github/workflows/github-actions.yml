name: .NET 9 CI Pipeline

on:
  pull_request:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser for UI tests (e.g., chrome, firefox)'
        required: false
        default: 'chrome'
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes

jobs:
  api_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Run API Tests
        run: dotnet test ./Tests/API/TestGetUsers.cs --logger "trx;LogFileName=api_tests.trx"
      - name: Upload API Test Results
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: '**/api_tests.trx'

  ui_tests:
    needs: api_tests
    if: always() # Run even if API tests fail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Run UI Tests
        env:
          BROWSER: ${{ github.event.inputs.browser || 'chrome' }}
        run: dotnet test ./Tests/TestArticleTitle.cs --logger "trx;LogFileName=ui_tests.trx" -- TestRunParameters.Parameter(name=\"Browser\", value=\"$BROWSER\")
      - name: Upload UI Test Results
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: '**/ui_tests.trx'
      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-screenshots
          path: ./screenshots/
